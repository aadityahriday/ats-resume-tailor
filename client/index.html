        <h2>What is an ATS Resume?</h2>
        <p>An <strong>ATS (Applicant Tracking System)</strong> is software used by <strong>99% of Fortune 500 companies</strong> and most mid-size employers to automatically screen, filter, and rank job applications before a human recruiter ever reviews them. Systems like <strong>Taleo, Workday, Greenhouse, Lever, and iCIMS</strong> scan your resume for keyword matches, proper formatting, and standard section headers. If your resume doesn't pass the ATS, it gets automatically rejected — even if you're the most qualified candidate. Studies show that <strong>75% of resumes are rejected by ATS before a human ever sees them</strong>.</p>

        <h2>Why Choose ResumeCopy?</h2>
        <ul>
          <li><strong>AI-Powered Keyword Matching</strong> — Our AI extracts every keyword from the job description and weaves them into your resume bullets.</li>

          <li><strong>Before & After Score Comparison</strong> — See your ATS score before and after optimization with a detailed breakdown.</li>
          <li><strong>100% Private & Secure</strong> — No sign-up required. Your data is processed in-memory and never stored.</li>
        </ul>

        <h2>ATS Score Breakdown</h2>
        <p>ResumeCopy uses a <strong>100% deterministic, algorithmic ATS scoring engine</strong>. Your resume is scored out of 100 across 6 dimensions:</p>
        <ul>
          <li><strong>Keyword Match (40 pts)</strong> — JD keywords and multi-word phrases found in resume</li>
          <li><strong>Section Headers (15 pts)</strong> — Standard ATS sections (Summary, Experience, Education, Skills)</li>
          <li><strong>Quantified Impact (15 pts)</strong> — Lines with numbers, metrics, and impact words</li>
          <li><strong>Action Verbs (10 pts)</strong> — Match against 35+ strong action verbs</li>
          <li><strong>Contact Data (10 pts)</strong> — Email, phone, LinkedIn, GitHub, location</li>
          <li><strong>Formatting (10 pts)</strong> — Bullet count, word count, date consistency</li>
        </ul>
