            "@type": "Answer",
            "text": "A score of 80+ is considered good, but 90+ significantly increases your chances of getting past automated screening. ResumeCopy's AI is engineered to rewrite your resume targeting a 90+ ATS score by matching JD keywords, using proper section headers, quantifying achievements, and including strong action verbs."
          }

          }
        },
        {
          "@type": "Question",
          "name": "Is my resume data secure?",
